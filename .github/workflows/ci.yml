name: CI

on:
  pull_request:
    branches: [dev, staging, master]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: regulahub_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d regulahub_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      API_KEYS: test-key
      DB_USER: test
      DB_PASSWORD: test
      DB_HOST: localhost
      DB_NAME: regulahub_test
      CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.CREDENTIAL_ENCRYPTION_KEY || 'dGVzdC1rZXktZm9yLWNpLXBpcGVsaW5lLTMyYnl0ZXM=' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check src/ tests/

      - name: Format check (ruff)
        run: poetry run ruff format --check src/ tests/

      - name: SAST (bandit)
        run: poetry run bandit -c pyproject.toml -r src/

      - name: Tests with coverage
        run: poetry run pytest tests/ -v --cov --cov-report=term-missing --cov-fail-under=70

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('admin/pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm --prefix admin install --frozen-lockfile

      - name: Lint
        run: pnpm --prefix admin lint

      - name: Type check
        run: pnpm --prefix admin build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_API_KEY: test-key

      - name: Tests
        run: pnpm --prefix admin test
