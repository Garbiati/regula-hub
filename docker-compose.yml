services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: regulahub
      POSTGRES_USER: regulahub
      POSTGRES_PASSWORD: regulahub_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regulahub -d regulahub"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./docker/seed:/app/docker/seed
      - ./docker/certs:/app/docker/certs:ro
    command: >
      sh -c "alembic upgrade head &&
             python -m regulahub.scripts.seed_credentials &&
             python -m regulahub.scripts.seed_demo_credentials &&
             uvicorn regulahub.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - backend
      - frontend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_KEY: ${API_KEYS}
    volumes:
      - ./admin/src:/app/src
      - ./admin/public:/app/public
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

volumes:
  pgdata:

networks:
  backend:
  frontend:
